<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>行政書士 穴埋め問題</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #263348;
      --border: #334155;
      --accent: #6366f1;
      --accent2: #818cf8;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --success: #22c55e;
      --success-bg: rgba(34, 197, 94, 0.12);
      --error: #f43f5e;
      --error-bg: rgba(244, 63, 94, 0.12);
      --radius: 14px;
      --radius-sm: 8px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
    }

    /* ===== ヘッダー ===== */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(15, 23, 42, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px 10px;
    }

    #header h1 {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent2);
      letter-spacing: 0.03em;
    }

    #progress-wrap {
      margin-top: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #progress-bar-bg {
      flex: 1;
      height: 5px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    #progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 99px;
      transition: width 0.4s ease;
      width: 0%;
    }

    #progress-text {
      font-size: 12px;
      color: var(--text-muted);
      white-space: nowrap;
      min-width: 60px;
      text-align: right;
    }

    /* ===== カテゴリ選択画面 ===== */
    #screen-category {
      flex: 1;
      padding: 20px 16px;
      overflow-y: auto;
    }

    #screen-category h2 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a5b4fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #screen-category p.sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .cat-all-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      border: none;
      border-radius: var(--radius);
      color: white;
      font-size: 15px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px var(--accent-glow);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .cat-all-btn:active { transform: scale(0.97); }

    .cat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
    }

    .cat-card:active { transform: scale(0.97); background: var(--surface2); }

    .cat-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      padding-right: 8px;
    }

    .cat-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--surface2);
      padding: 3px 9px;
      border-radius: 99px;
      white-space: nowrap;
    }

    /* ===== 問題画面 ===== */
    #screen-quiz {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #quiz-category-label {
      font-size: 11px;
      color: var(--accent2);
      padding: 10px 16px 0;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    #quiz-card {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px 100px;
    }

    .question-text {
      font-size: 15px;
      line-height: 1.8;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 16px;
    }

    .blank-slot {
      display: inline-block;
      background: var(--surface2);
      border: 1.5px solid var(--accent);
      border-radius: 6px;
      min-width: 60px;
      padding: 1px 8px;
      font-weight: 700;
      color: var(--accent2);
      text-align: center;
      white-space: nowrap;
    }

    .blank-slot.correct {
      background: var(--success-bg);
      border-color: var(--success);
      color: var(--success);
    }

    .blank-slot.wrong {
      background: var(--error-bg);
      border-color: var(--error);
      color: var(--error);
    }

    /* 解答入力エリア */
    #answer-area { margin-bottom: 12px; }

    .blank-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }

    .blank-label {
      font-size: 13px;
      font-weight: 700;
      color: var(--accent2);
      min-width: 28px;
      text-align: center;
    }

    .blank-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }

    .blank-input:focus { border-color: var(--accent); background: var(--surface2); }
    .blank-input.correct { border-color: var(--success); background: var(--success-bg); color: var(--success); }
    .blank-input.wrong { border-color: var(--error); background: var(--error-bg); color: var(--error); }

    /* 正解表示 */
    #answer-reveal-area {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      margin-bottom: 12px;
    }

    #answer-reveal-area h4 {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
      letter-spacing: 0.05em;
    }

    .answer-list { display: flex; flex-wrap: wrap; gap: 8px; }

    .answer-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--surface2);
      border-radius: 99px;
      padding: 5px 12px;
      font-size: 14px;
    }

    .answer-chip .chip-id { font-size: 11px; color: var(--text-muted); font-weight: 500; }
    .answer-chip .chip-ans { font-weight: 700; color: var(--success); }

    /* ===== 底部ボタン ===== */
    #bottom-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      z-index: 50;
    }

    .btn {
      flex: 1;
      padding: 13px 8px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.1s;
      -webkit-appearance: none;
    }

    .btn:active { transform: scale(0.95); opacity: 0.85; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), #7c3aed); color: white; box-shadow: 0 2px 12px var(--accent-glow); }
    .btn-ghost { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); }
    .btn-success { background: linear-gradient(135deg, #16a34a, #22c55e); color: white; }
    .btn-back { background: var(--surface); border: 1px solid var(--border); color: var(--text-muted); flex: 0 0 auto; padding: 13px 16px; }

    /* ===== 結果画面 ===== */
    #screen-result {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 24px;
      text-align: center;
    }

    .result-emoji { font-size: 56px; margin-bottom: 16px; }
    .result-score {
      font-size: 48px;
      font-weight: 700;
      background: linear-gradient(135deg, #a5b4fc, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 4px;
    }
    .result-label { font-size: 14px; color: var(--text-muted); margin-bottom: 28px; }
    .result-breakdown { display: flex; gap: 20px; margin-bottom: 32px; }
    .result-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      min-width: 90px;
    }
    .result-item .val { font-size: 24px; font-weight: 700; }
    .result-item .lbl { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .val.ok { color: var(--success); }
    .val.ng { color: var(--error); }
    .result-btns { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 320px; }
    .result-btns .btn { flex: none; padding: 15px; font-size: 15px; }

    /* ===== ローディング ===== */
    #screen-loading {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 14px; color: var(--text-muted); }

    /* ===== 表示切替 ===== */
    .screen { display: none; flex-direction: column; flex: 1; }
    .screen.active { display: flex; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }
  </style>
</head>
<body>

<div id="header">
  <h1>📖 行政書士 穴埋め問題</h1>
  <div id="progress-wrap" style="display:none">
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
    <div id="progress-text">0 / 0</div>
  </div>
</div>

<div id="screen-loading" class="screen active">
  <div class="spinner"></div>
  <div id="loading-text">問題データを読み込み中...</div>
</div>

<div id="screen-category" class="screen" style="display:none; flex:1; overflow-y:auto;">
  <h2>カテゴリを選択</h2>
  <p class="sub">学習したいカテゴリを選んでください</p>
  <button class="cat-all-btn" onclick="startQuiz(null)">
    <span>🎯 全問題（シャッフル）</span>
    <span id="total-count-badge">0問</span>
  </button>
  <div id="category-list"></div>
</div>

<div id="screen-quiz" class="screen" style="display:none;">
  <div id="quiz-category-label"></div>
  <div id="quiz-card">
    <div class="question-text" id="question-text"></div>
    <div id="answer-area"></div>
    <div id="answer-reveal-area">
      <h4>✅ 正解</h4>
      <div class="answer-list" id="answer-list"></div>
    </div>
  </div>
  <div id="bottom-bar">
    <button class="btn btn-back" onclick="backToCategory()">≪</button>
    <button class="btn btn-primary" id="btn-check" onclick="checkAnswer()">答え合わせ</button>
    <button class="btn btn-ghost" id="btn-skip" onclick="nextQuestion(false)">スキップ</button>
  </div>
</div>

<div id="screen-result" class="screen" style="display:none;">
  <div class="result-emoji" id="result-emoji">🎉</div>
  <div class="result-score" id="result-score">0%</div>
  <div class="result-label" id="result-label">完了！</div>
  <div class="result-breakdown">
    <div class="result-item"><div class="val ok" id="res-ok">0</div><div class="lbl">正解</div></div>
    <div class="result-item"><div class="val ng" id="res-ng">0</div><div class="lbl">不正解</div></div>
    <div class="result-item"><div class="val" id="res-skip" style="color:var(--text-muted)">0</div><div class="lbl">スキップ</div></div>
  </div>
  <div class="result-btns">
    <button class="btn btn-success" onclick="retryWrong()">❌ 間違えた問題を再挑戦</button>
    <button class="btn btn-primary" onclick="backToCategory()">カテゴリ選択に戻る</button>
  </div>
</div>

<script>
let allQuestions = [];
let quizQueue = [];
let currentIdx = 0;
let score = { ok: 0, ng: 0, skip: 0 };
let wrongIds = [];
let answered = false;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => {
    s.style.display = 'none';
    s.classList.remove('active');
  });
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.classList.add('active');
  const isQuiz = id === 'screen-quiz';
  document.getElementById('progress-wrap').style.display = isQuiz ? 'flex' : 'none';
}

async function loadData() {
  try {
    const res = await fetch('fill_blanks.json');
    allQuestions = await res.json();
    buildCategoryScreen();
    showScreen('screen-category');
  } catch(e) {
    document.getElementById('loading-text').textContent = 'データの読み込みに失敗しました。ページを再読み込みしてください。';
  }
}

function buildCategoryScreen() {
  document.getElementById('total-count-badge').textContent = allQuestions.length + '問';
  const cats = {};
  allQuestions.forEach(q => {
    const c = q.category || '未分類';
    cats[c] = (cats[c] || 0) + 1;
  });
  const sorted = Object.entries(cats).sort((a,b) => b[1] - a[1]);
  document.getElementById('category-list').innerHTML = sorted.map(([name, cnt]) => `
    <div class="cat-card" onclick="startQuiz('${escHtml(name)}')">
      <div class="cat-name">${escHtml(name)}</div>
      <div class="cat-count">${cnt}問</div>
    </div>
  `).join('');
}

function startQuiz(category) {
  let pool = category
    ? allQuestions.filter(q => q.category === category)
    : [...allQuestions];
  for (let i = pool.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [pool[i], pool[j]] = [pool[j], pool[i]];
  }
  quizQueue = pool;
  currentIdx = 0;
  score = { ok: 0, ng: 0, skip: 0 };
  wrongIds = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function retryWrong() {
  const pool = allQuestions.filter(q => wrongIds.includes(q.id));
  if (!pool.length) { backToCategory(); return; }
  quizQueue = pool;
  currentIdx = 0;
  score = { ok: 0, ng: 0, skip: 0 };
  wrongIds = [];
  showScreen('screen-quiz');
  renderQuestion();
}

function backToCategory() { showScreen('screen-category'); }

function renderQuestion() {
  if (currentIdx >= quizQueue.length) { showResult(); return; }
  answered = false;
  const q = quizQueue[currentIdx];

  const pct = (currentIdx / quizQueue.length * 100).toFixed(0);
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('progress-text').textContent = `${currentIdx + 1} / ${quizQueue.length}`;
  document.getElementById('quiz-category-label').textContent = q.category || '';

  let html = escHtml(q.question);
  (q.blanks || []).forEach(b => {
    html = html.replace(
      `（ ${b.id} ）`,
      `<span class="blank-slot" data-blank-id="${escHtml(b.id)}">${escHtml(b.id)}</span>`
    );
  });
  document.getElementById('question-text').innerHTML = html;

  const areaEl = document.getElementById('answer-area');
  areaEl.innerHTML = (q.blanks || []).map(b => `
    <div class="blank-row">
      <div class="blank-label">${escHtml(b.id)}</div>
      <input class="blank-input" type="text" id="input-${escHtml(b.id)}"
             placeholder="解答を入力..."
             data-blank-id="${escHtml(b.id)}"
             data-answer="${escHtml(b.answer)}"
             autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
    </div>
  `).join('');

  document.getElementById('answer-reveal-area').style.display = 'none';
  document.getElementById('answer-list').innerHTML = '';

  const btn = document.getElementById('btn-check');
  btn.textContent = '答え合わせ';
  btn.className = 'btn btn-primary';
  btn.onclick = checkAnswer;
  document.getElementById('btn-skip').style.display = '';

  areaEl.querySelectorAll('.blank-input').forEach((inp, i, arr) => {
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (i < arr.length - 1) arr[i + 1].focus();
        else if (!answered) checkAnswer();
      }
    });
  });

  document.getElementById('quiz-card').scrollTop = 0;
}

function checkAnswer() {
  if (answered) { nextQuestion(true); return; }
  answered = true;
  const q = quizQueue[currentIdx];
  let allCorrect = true;
  const results = [];

  (q.blanks || []).forEach(b => {
    const inp = document.getElementById('input-' + b.id);
    const userVal = inp ? inp.value.trim() : '';
    const isOk = normalize(userVal) === normalize(b.answer);
    if (!isOk) allCorrect = false;
    if (inp) inp.classList.add(isOk ? 'correct' : 'wrong');
    const slot = document.querySelector(`.blank-slot[data-blank-id="${b.id}"]`);
    if (slot) { slot.textContent = b.answer; slot.classList.add(isOk ? 'correct' : 'wrong'); }
    results.push({ id: b.id, answer: b.answer, ok: isOk });
  });

  if (allCorrect) { score.ok++; }
  else { score.ng++; if (!wrongIds.includes(q.id)) wrongIds.push(q.id); }

  const revealEl = document.getElementById('answer-reveal-area');
  document.getElementById('answer-list').innerHTML = results.map(r => `
    <div class="answer-chip">
      <span class="chip-id">${escHtml(r.id)}</span>
      <span class="chip-ans">${escHtml(r.answer)}</span>
    </div>
  `).join('');
  revealEl.style.display = 'block';

  const btn = document.getElementById('btn-check');
  btn.textContent = '次の問題 →';
  btn.className = 'btn btn-success';
  btn.onclick = () => nextQuestion(true);
  document.getElementById('btn-skip').style.display = 'none';

  setTimeout(() => revealEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100);
}

function nextQuestion(counted) {
  if (!counted && !answered) score.skip++;
  currentIdx++;
  renderQuestion();
}

function showResult() {
  const total = score.ok + score.ng;
  const pct = total > 0 ? Math.round(score.ok / total * 100) : 0;
  document.getElementById('progress-bar').style.width = '100%';
  document.getElementById('progress-text').textContent = '完了！';
  document.getElementById('result-score').textContent = pct + '%';
  document.getElementById('res-ok').textContent = score.ok;
  document.getElementById('res-ng').textContent = score.ng;
  document.getElementById('res-skip').textContent = score.skip;
  const emoji = pct >= 90 ? '🏆' : pct >= 70 ? '🎉' : pct >= 50 ? '💪' : '📚';
  document.getElementById('result-emoji').textContent = emoji;
  document.getElementById('result-label').textContent =
    pct >= 90 ? '素晴らしい！' : pct >= 70 ? 'よくできました！' : pct >= 50 ? 'もう少し！' : '復習しましょう';
  const retryBtn = document.querySelector('.result-btns .btn-success');
  if (wrongIds.length === 0) {
    retryBtn.disabled = true; retryBtn.style.opacity = '0.4';
  } else {
    retryBtn.disabled = false; retryBtn.style.opacity = '1';
    retryBtn.textContent = `❌ 間違えた問題を再挑戦（${wrongIds.length}問）`;
  }
  document.getElementById('progress-wrap').style.display = 'flex';
  showScreen('screen-result');
}

function normalize(str) {
  return str
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0))
    .replace(/[　\s]/g, '')
    .toLowerCase();
}

function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

loadData();
</script>
</body>
</html>
